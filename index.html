<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIT</title>
<link rel="manifest" href="/grit-app/manifest.json">
<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; text-align:center; }
.container { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:20px; }
.quote { font-size:24px; margin-bottom:20px; }
.author { font-size:16px; opacity:0.7; }
</style>
</head>
<body>
<div class="container">
  <div class="quote" id="quote"></div>
  <div class="author" id="author"></div>
</div>
<script>
const quotes = [
{ text:"継続は力なり", author:"日本のことわざ" },
{ text:"Success is not final, failure is not fatal.", author:"Winston Churchill（成功は終わりではなく、失敗は致命的ではない）" },
{ text:"努力は裏切らない", author:"王貞治" },
{ text:"Do it now.", author:"即行動しろ" }
];

let index = new Date().getDate() % quotes.length;

function showQuote(i){
  document.getElementById("quote").innerText = quotes[i].text;
  document.getElementById("author").innerText = quotes[i].author;
}

showQuote(index);

let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) index = (index + 1) % quotes.length;
  if(endX - startX > 50) index = (index - 1 + quotes.length) % quotes.length;
  showQuote(index);
});



</script>
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
  </script>
</body>
</html>
