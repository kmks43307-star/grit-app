<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIT</title>
<link rel="manifest" href="/grit-app/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #222;
  --accent: #e8ff00;
  --accent2: #ff3c3c;
  --text: #f0f0f0;
  --muted: #555;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* ── NAV ── */
nav {
  display:flex; justify-content:space-between; align-items:center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  position:sticky; top:0; z-index:100;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(12px);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 6px;
  color: var(--accent);
}

.streak-badge {
  display:flex; align-items:center; gap:8px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
  cursor:pointer;
  transition: border-color .2s;
}
.streak-badge:hover { border-color: var(--accent); }
.streak-badge .fire { font-size:18px; }
.streak-num { color: var(--accent); font-size:18px; font-family:'Bebas Neue',sans-serif; }

/* ── TABS ── */
.tabs {
  display:flex; gap:0;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 14px 20px;
  font-size: 13px;
  font-weight:700;
  letter-spacing: 2px;
  text-transform:uppercase;
  cursor:pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── PAGES ── */
.page { display:none; padding: 32px 24px; max-width: 600px; margin: 0 auto; }
.page.active { display:block; }

/* ── QUOTE PAGE ── */
.quote-wrap {
  min-height: 60vh;
  display:flex; flex-direction:column; justify-content:center;
  position:relative;
}

.quote-number {
  font-family:'Bebas Neue',sans-serif;
  font-size: 120px;
  color: var(--border);
  position:absolute;
  top: -20px; left: -10px;
  line-height:1;
  z-index:0;
  user-select:none;
}

.quote-text {
  font-family:'Bebas Neue',sans-serif;
  font-size: clamp(28px, 7vw, 52px);
  line-height: 1.1;
  letter-spacing: 2px;
  position:relative; z-index:1;
  padding-top: 40px;
  animation: fadeUp .4s ease;
}

.quote-author {
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  animation: fadeUp .4s ease .1s both;
}

.quote-author::before {
  content:'— ';
}

.swipe-hint {
  margin-top: 48px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  display:flex; gap:16px; align-items:center;
}
.swipe-hint span { opacity:.5; }

.quote-dots {
  display:flex; gap:8px; margin-top:32px;
}
.dot {
  width:6px; height:6px; border-radius:50%;
  background: var(--border);
  transition: background .2s, transform .2s;
}
.dot.active { background: var(--accent); transform:scale(1.5); }

/* ── CHECK-IN ── */
.checkin-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
}

.checkin-card h3 {
  font-family:'Bebas Neue',sans-serif;
  font-size: 22px;
  letter-spacing:3px;
  margin-bottom: 20px;
  color: var(--accent);
}

.task-list { display:flex; flex-direction:column; gap:12px; }

.task-item {
  display:flex; align-items:center; gap:14px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor:pointer;
  transition: border-color .2s, background .2s;
  user-select:none;
}
.task-item:hover { border-color: var(--accent); }
.task-item.done { background: rgba(232,255,0,0.04); border-color: rgba(232,255,0,0.3); }

.task-check {
  width:22px; height:22px; border-radius:50%;
  border: 2px solid var(--muted);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition: all .2s;
  font-size:12px;
}
.task-item.done .task-check {
  background: var(--accent); border-color: var(--accent); color:#000;
}

.task-label { font-size:14px; flex:1; }
.task-item.done .task-label { opacity:.5; text-decoration: line-through; }

.add-task-row {
  display:flex; gap:10px; margin-top:14px;
}
.add-task-row input {
  flex:1; background:var(--bg); border:1px solid var(--border);
  color:var(--text); padding:12px 16px; border-radius:10px;
  font-family:inherit; font-size:14px; outline:none;
  transition:border-color .2s;
}
.add-task-row input:focus { border-color:var(--accent); }
.add-task-row button {
  background:var(--accent); color:#000;
  border:none; padding:12px 20px; border-radius:10px;
  font-weight:700; cursor:pointer; font-family:inherit;
  transition: opacity .2s;
}
.add-task-row button:hover { opacity:.8; }

/* ── HEATMAP ── */
.heatmap-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:28px; margin-bottom:20px;
}
.heatmap-wrap h3 {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px; letter-spacing:3px;
  margin-bottom:20px; color:var(--accent);
}

.heatmap {
  display:grid;
  grid-template-columns: repeat(15, 1fr);
  gap:4px;
}

.hm-cell {
  aspect-ratio:1;
  border-radius:3px;
  background:var(--border);
  transition:background .2s;
  cursor:pointer;
  position:relative;
}
.hm-cell[data-level="1"] { background: rgba(232,255,0,0.2); }
.hm-cell[data-level="2"] { background: rgba(232,255,0,0.5); }
.hm-cell[data-level="3"] { background: rgba(232,255,0,0.85); }
.hm-cell[data-level="today"] {
  background: var(--accent2);
  box-shadow: 0 0 8px rgba(255,60,60,0.5);
}

/* ── AI COACH ── */
.ai-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:28px; margin-bottom:20px;
}
.ai-card h3 {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px; letter-spacing:3px;
  margin-bottom:6px; color:var(--accent);
}
.ai-card .subtitle {
  font-size:12px; color:var(--muted);
  letter-spacing:2px; margin-bottom:20px;
  text-transform:uppercase;
}

.ai-input-wrap { position:relative; }
.ai-input-wrap textarea {
  width:100%; background:var(--bg); border:1px solid var(--border);
  color:var(--text); padding:16px; border-radius:12px;
  font-family:inherit; font-size:14px; outline:none;
  resize:none; height:100px;
  transition:border-color .2s;
}
.ai-input-wrap textarea:focus { border-color:var(--accent); }

.ai-btn {
  margin-top:12px;
  width:100%; padding:14px;
  background:var(--accent); color:#000;
  border:none; border-radius:12px;
  font-family:'Bebas Neue',sans-serif;
  font-size:18px; letter-spacing:3px;
  cursor:pointer; transition:opacity .2s;
}
.ai-btn:hover { opacity:.85; }
.ai-btn:disabled { opacity:.4; cursor:not-allowed; }

.ai-response {
  margin-top:20px;
  padding:20px;
  background:var(--bg);
  border:1px solid rgba(232,255,0,0.2);
  border-radius:12px;
  font-size:14px; line-height:1.8;
  display:none;
  animation:fadeUp .3s ease;
}
.ai-response.show { display:block; }

.ai-thinking {
  display:flex; gap:6px; align-items:center;
  color:var(--muted); font-size:13px;
}
.ai-thinking span {
  display:inline-block;
  width:6px; height:6px; border-radius:50%;
  background:var(--accent);
  animation: pulse 1s ease infinite;
}
.ai-thinking span:nth-child(2) { animation-delay:.2s; }
.ai-thinking span:nth-child(3) { animation-delay:.4s; }

/* ── STATS ── */
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:14px; margin-bottom:20px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:22px;
}
.stat-card .val {
  font-family:'Bebas Neue',sans-serif;
  font-size:48px; color:var(--accent); line-height:1;
}
.stat-card .lbl {
  font-size:11px; color:var(--muted);
  letter-spacing:2px; text-transform:uppercase;
  margin-top:4px;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); opacity:.5; }
  50%      { transform:scale(1.4); opacity:1; }
}
</style>
</head>
<body>

<nav>
  <div class="logo">GRIT</div>
  <div class="streak-badge" onclick="showTab('stats')">
    <span class="fire">🔥</span>
    <span class="streak-num" id="streakNum">0</span>
    <span style="font-size:11px;color:var(--muted);letter-spacing:1px;">DAY STREAK</span>
  </div>
</nav>

<div class="tabs">
  <div class="tab active" onclick="showTab('quote')">名言</div>
  <div class="tab" onclick="showTab('checkin')">今日</div>
  <div class="tab" onclick="showTab('ai')">AIコーチ</div>
  <div class="tab" onclick="showTab('stats')">記録</div>
</div>

<!-- QUOTE -->
<div class="page active" id="page-quote">
  <div class="quote-wrap">
    <div class="quote-number" id="qNum">01</div>
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-author" id="quoteAuthor"></div>
    <div class="swipe-hint">
      <span>← スワイプで切り替え →</span>
    </div>
    <div class="quote-dots" id="quoteDots"></div>
  </div>
</div>

<!-- CHECK-IN -->
<div class="page" id="page-checkin">
  <div class="checkin-card">
    <h3>TODAY'S TASKS</h3>
    <div class="task-list" id="taskList"></div>
    <div class="add-task-row">
      <input type="text" id="taskInput" placeholder="新しいタスクを追加..." />
      <button onclick="addTask()">追加</button>
    </div>
  </div>
  <div class="checkin-card">
    <h3>今日の完了率</h3>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--accent);line-height:1;" id="completionRate">0%</div>
    <div style="font-size:12px;color:var(--muted);letter-spacing:2px;margin-top:4px;">COMPLETION RATE</div>
  </div>
</div>

<!-- AI COACH -->
<div class="page" id="page-ai">
  <div class="ai-card">
    <h3>AI COACH</h3>
    <div class="subtitle">今日の状況を話してみて</div>
    <div class="ai-input-wrap">
      <textarea id="aiInput" placeholder="例：今日は仕事が忙しくてタスクが全然できなかった。やる気が出ない..."></textarea>
    </div>
    <button class="ai-btn" id="aiBtn" onclick="askCoach()">コーチに相談する</button>
    <div class="ai-response" id="aiResponse"></div>
  </div>
</div>

<!-- STATS -->
<div class="page" id="page-stats">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="val" id="statStreak">0</div>
      <div class="lbl">🔥 Streak</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statTotal">0</div>
      <div class="lbl">✅ 総完了数</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statDays">0</div>
      <div class="lbl">📅 活動日数</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statBest">0</div>
      <div class="lbl">🏆 最高連続</div>
    </div>
  </div>
  <div class="heatmap-wrap">
    <h3>ACTIVITY</h3>
    <div class="heatmap" id="heatmap"></div>
    <div style="display:flex;gap:8px;margin-top:14px;align-items:center;">
      <span style="font-size:11px;color:var(--muted);">少ない</span>
      <div style="width:12px;height:12px;border-radius:2px;background:var(--border)"></div>
      <div style="width:12px;height:12px;border-radius:2px;background:rgba(232,255,0,0.2)"></div>
      <div style="width:12px;height:12px;border-radius:2px;background:rgba(232,255,0,0.5)"></div>
      <div style="width:12px;height:12px;border-radius:2px;background:var(--accent)"></div>
      <span style="font-size:11px;color:var(--muted);">多い</span>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const QUOTES = [
  { text:"継続は力なり", author:"日本のことわざ" },
  { text:"SUCCESS IS NOT FINAL, FAILURE IS NOT FATAL.", author:"Winston Churchill" },
  { text:"努力は裏切らない", author:"王貞治" },
  { text:"DO IT NOW.", author:"即行動しろ" },
  { text:"Pain is temporary. Quitting lasts forever.", author:"Lance Armstrong" },
  { text:"我慢強さこそが、天才よりも重要だ。", author:"Angela Duckworth" },
  { text:"Hard work beats talent when talent doesn't work hard.", author:"Tim Notke" },
  { text:"今日できることを明日に延ばすな。", author:"Benjamin Franklin" },
];

let state = JSON.parse(localStorage.getItem('grit_state') || '{}');
if (!state.tasks) state.tasks = [
  { id:1, label:"30分運動する", done:false },
  { id:2, label:"本を10ページ読む", done:false },
];
if (!state.history) state.history = {};
if (!state.streak) state.streak = 0;
if (!state.bestStreak) state.bestStreak = 0;
if (!state.totalDone) state.totalDone = 0;

function save() { localStorage.setItem('grit_state', JSON.stringify(state)); }

const today = new Date().toISOString().split('T')[0];

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const tabs = ['quote','checkin','ai','stats'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)]?.classList.add('active');
  if (name === 'stats') renderStats();
}

// ── QUOTES ──
let qIndex = new Date().getDate() % QUOTES.length;

function renderQuote() {
  const q = QUOTES[qIndex];
  const el = document.getElementById('quoteText');
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = '';
  el.innerText = q.text;
  document.getElementById('quoteAuthor').innerText = q.author;
  document.getElementById('qNum').innerText = String(qIndex+1).padStart(2,'0');

  const dots = document.getElementById('quoteDots');
  dots.innerHTML = QUOTES.map((_, i) =>
    `<div class="dot ${i===qIndex?'active':''}"></div>`).join('');
}
renderQuote();

let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchend", e => {
  if (!document.getElementById('page-quote').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - startX;
  if (dx < -50) qIndex = (qIndex+1) % QUOTES.length;
  if (dx >  50) qIndex = (qIndex-1+QUOTES.length) % QUOTES.length;
  renderQuote();
});

// Arrow keys too
document.addEventListener('keydown', e => {
  if (!document.getElementById('page-quote').classList.contains('active')) return;
  if (e.key==='ArrowRight') { qIndex=(qIndex+1)%QUOTES.length; renderQuote(); }
  if (e.key==='ArrowLeft')  { qIndex=(qIndex-1+QUOTES.length)%QUOTES.length; renderQuote(); }
});

// ── TASKS ──
function renderTasks() {
  const list = document.getElementById('taskList');
  const todayTasks = state.tasks;
  list.innerHTML = todayTasks.map(t => `
    <div class="task-item ${t.done?'done':''}" onclick="toggleTask(${t.id})">
      <div class="task-check">${t.done?'✓':''}</div>
      <div class="task-label">${t.label}</div>
    </div>
  `).join('');
  updateCompletion();
}

function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) state.totalDone = (state.totalDone||0)+1;
  else state.totalDone = Math.max(0,(state.totalDone||1)-1);
  updateTodayHistory();
  save();
  renderTasks();
}

function addTask() {
  const input = document.getElementById('taskInput');
  const label = input.value.trim();
  if (!label) return;
  const newId = Date.now();
  state.tasks.push({ id: newId, label, done:false });
  input.value = '';
  save();
  renderTasks();
}
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key==='Enter') addTask();
});

function updateCompletion() {
  const total = state.tasks.length;
  const done = state.tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('completionRate').innerText = pct + '%';
}

function updateTodayHistory() {
  const done = state.tasks.filter(t=>t.done).length;
  state.history[today] = done;
  updateStreak();
}

function updateStreak() {
  let streak = 0;
  let d = new Date();
  while(true) {
    const key = d.toISOString().split('T')[0];
    if (state.history[key] && state.history[key] > 0) {
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  state.streak = streak;
  state.bestStreak = Math.max(state.bestStreak||0, streak);
  document.getElementById('streakNum').innerText = streak;
  document.getElementById('statStreak').innerText = streak;
  save();
}

renderTasks();
updateStreak();

// ── STATS ──
function renderStats() {
  document.getElementById('statStreak').innerText = state.streak||0;
  document.getElementById('statTotal').innerText = state.totalDone||0;
  document.getElementById('statDays').innerText = Object.keys(state.history).filter(k=>state.history[k]>0).length;
  document.getElementById('statBest').innerText = state.bestStreak||0;
  renderHeatmap();
}

function renderHeatmap() {
  const hm = document.getElementById('heatmap');
  const cells = [];
  const now = new Date();
  for (let i=89; i>=0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate()-i);
    const key = d.toISOString().split('T')[0];
    const val = state.history[key]||0;
    const isToday = key===today;
    let level = isToday ? 'today' : val===0?0:val<=1?1:val<=3?2:3;
    cells.push(`<div class="hm-cell" data-level="${level}" title="${key}: ${val}件"></div>`);
  }
  hm.innerHTML = cells.join('');
}

// ── AI COACH ──
async function askCoach() {
  const input = document.getElementById('aiInput').value.trim();
  if (!input) return;

  const btn = document.getElementById('aiBtn');
  const resp = document.getElementById('aiResponse');
  btn.disabled = true;
  resp.className = 'ai-response show';
  resp.innerHTML = `<div class="ai-thinking"><span></span><span></span><span></span> 考えています...</div>`;

  const done = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  const streak = state.streak;

  const systemPrompt = `あなたはGRITアプリの厳しくも温かいパーソナルコーチです。
ユーザーの状況：今日${total}個中${done}個のタスク完了。連続${streak}日継続中。
短く(200文字以内)、具体的に、励ましながらもズバリ本質を突いたアドバイスをしてください。
語尾は「！」を使い、テンポよく話してください。絵文字も1〜2個使ってOK。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:300,
        system: systemPrompt,
        messages:[{ role:"user", content:input }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || "うまく取得できませんでした。";
    resp.innerHTML = `<div style="line-height:1.9">${text.replace(/\n/g,'<br>')}</div>`;
  } catch(e) {
    resp.innerHTML = `<div style="color:var(--accent2)">接続エラーが発生しました。</div>`;
  }
  btn.disabled = false;
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
